<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>{{companion_name}}的房间</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; }

/* ── Room container ── */
#room { position: fixed; inset: 0; overflow: hidden; }

/* ── Room background layers ── */
#bg-layer { position: absolute; inset: 0; z-index: 1; }

/* ── Furniture layer ── */
#furniture-layer { position: absolute; inset: 0; z-index: 2; pointer-events: none; }

/* ── Character ── */
#character {
  position: absolute; z-index: 10;
  transition: left 2.5s ease-in-out, top 2.5s ease-in-out;
  pointer-events: none;
  filter: drop-shadow(0 6px 12px rgba(0,0,0,0.2));
}
@keyframes char-idle {
  0%, 100% { transform: translateY(0) scaleY(1); }
  50% { transform: translateY(-5px) scaleY(1.02); }
}
@keyframes char-walk {
  0%, 100% { transform: translateY(0) scaleX(1); }
  25% { transform: translateY(-3px) scaleX(1.03); }
  75% { transform: translateY(-3px) scaleX(0.97); }
}
#character.idle { animation: char-idle 2s ease-in-out infinite; }
#character.walk { animation: char-walk 0.4s ease-in-out infinite; }
#character.bounce { animation: char-idle 0.3s ease-in-out 3; }

/* ── Chat panel ── */
#chat-panel {
  position: fixed; bottom: 16px; right: 16px;
  width: 340px; height: 480px;
  background: rgba(255,255,255,0.95);
  border-radius: 20px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.15);
  z-index: 100; display: flex; flex-direction: column; overflow: hidden;
  backdrop-filter: blur(12px);
}
#chat-header {
  padding: 12px 16px; display: flex; align-items: center; gap: 10px;
  border-bottom: 1px solid rgba(0,0,0,0.08); font-size: 14px; font-weight: 600;
  background: linear-gradient(135deg, {{accent_color}}22, {{accent_color}}11);
}
#chat-avatar {
  width: 34px; height: 34px; border-radius: 50%;
  background: {{accent_color}}; display: flex; align-items: center; justify-content: center; font-size: 18px;
}
#chat-msgs { flex: 1; overflow-y: auto; padding: 10px 12px; display: flex; flex-direction: column; gap: 8px; }
.msg { max-width: 82%; padding: 8px 12px; border-radius: 14px; font-size: 13px; line-height: 1.5; word-break: break-word; }
.msg.ai { background: #f0f0f0; color: #333; align-self: flex-start; border-bottom-left-radius: 4px; }
.msg.user { background: linear-gradient(135deg, {{accent_color}}, {{accent_color}}cc); color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
.msg-time { font-size: 10px; color: #aaa; margin-top: 2px; text-align: right; }
#typing { display: none; padding: 8px 12px; background: #f0f0f0; border-radius: 14px; font-size: 12px; color: #888; align-self: flex-start; border-bottom-left-radius: 4px; }
#typing.show { display: block; }
#chat-input-row { padding: 8px 12px; border-top: 1px solid rgba(0,0,0,0.08); display: flex; gap: 6px; }
#chat-input { flex: 1; border: 1.5px solid #e0e0e0; border-radius: 20px; padding: 8px 12px; font-size: 13px; outline: none; }
#chat-input:focus { border-color: {{accent_color}}; }
#send-btn {
  background: {{accent_color}}; color: #fff; border: none; border-radius: 20px;
  padding: 8px 16px; font-size: 13px; cursor: pointer;
}

/* ── Nav pills ── */
#nav { position: fixed; top: 14px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; z-index: 200; }
.nav-pill {
  padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 600;
  cursor: pointer; text-decoration: none; transition: transform 0.2s;
  backdrop-filter: blur(8px);
}
.nav-pill:hover { transform: scale(1.06); }

/* ── Speech bubble ── */
#speech {
  position: fixed; top: 70px; left: 50%; transform: translateX(-50%);
  background: rgba(255,255,255,0.96); border-radius: 16px; padding: 10px 18px;
  font-size: 14px; max-width: 380px; text-align: center;
  box-shadow: 0 4px 20px rgba(0,0,0,0.1); z-index: 200;
  opacity: 0; transition: opacity 0.4s; pointer-events: none;
}
#speech.show { opacity: 1; }

/* ── Floating particles ── */
.particle {
  position: absolute; border-radius: 50%; opacity: 0.35;
  animation: float-up linear infinite; pointer-events: none;
}
@keyframes float-up {
  0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
  10% { opacity: 0.4; }
  90% { opacity: 0.4; }
  100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
}

/* ── Companion badge ── */
#badge {
  position: fixed; top: 14px; left: 14px; z-index: 200;
  background: rgba(255,255,255,0.92); padding: 6px 14px; border-radius: 20px;
  font-size: 13px; font-weight: 600; backdrop-filter: blur(8px);
  box-shadow: 0 2px 12px rgba(0,0,0,0.1);
}

/* ── Loading ── */
#loading {
  position: fixed; inset: 0; z-index: 999;
  background: linear-gradient(135deg, {{accent_color}}, {{accent_color}}aa);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  color: #fff; transition: opacity 0.5s;
}
#loading.out { opacity: 0; pointer-events: none; }
.loader { width: 44px; height: 44px; border: 4px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.9s linear infinite; margin-bottom: 12px; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- Loading -->
<div id="loading">
  <div class="loader"></div>
  <span id="load-text">正在进入{{companion_name}}的房间…</span>
</div>

<!-- Navigation -->
<div id="nav">
  <a href="/room/luna" class="nav-pill" style="background:rgba(255,179,208,0.9);color:#7a3050">🌙 Luna</a>
  <a href="/room/kai" class="nav-pill" style="background:rgba(64,128,255,0.9);color:#fff">🌊 Kai</a>
  <a href="/room/nova" class="nav-pill" style="background:rgba(255,140,0,0.9);color:#fff">⭐ Nova</a>
  <a href="/room/milo" class="nav-pill" style="background:rgba(80,200,120,0.9);color:#fff">🌿 Milo</a>
  <a href="/room/sage" class="nav-pill" style="background:rgba(200,149,108,0.9);color:#fff">📚 Sage</a>
  <a href="/room3d/{{companion_id}}" class="nav-pill" style="background:rgba(150,100,255,0.85);color:#fff">🎮 3D房间</a>
</div>

<div id="badge"><span id="badge-emoji">{{companion_emoji}}</span> <span id="badge-name">{{companion_name}}</span></div>

<!-- Room canvas -->
<canvas id="bg-layer"></canvas>
<canvas id="furniture-layer"></canvas>

<!-- Character -->
<div id="character" class="idle">
  <div id="char-body"></div>
</div>

<!-- Speech bubble -->
<div id="speech"></div>

<!-- Chat -->
<div id="chat-panel">
  <div id="chat-header">
    <div id="chat-avatar">{{companion_emoji}}</div>
    <span>{{companion_name}}</span>
    <span style="width:8px;height:8px;background:#4caf50;border-radius:50%;margin-left:auto;box-shadow:0 0 6px #4caf50"></span>
  </div>
  <div id="chat-msgs">
    <div class="msg ai">{{companion_name}}：{{companion_greeting}}</div>
  </div>
  <div id="typing">✍️ {{companion_name}}正在思考…</div>
  <div id="chat-input-row">
    <input id="chat-input" placeholder="跟{{companion_name}}说点什么…" maxlength="400" />
    <button id="send-btn" onclick="sendMsg()">发送</button>
  </div>
</div>

<script>
// ─── Companion configs ───
const COMPANION_ID = "{{companion_id}}";
const COMPANION_NAME = "{{companion_name}}";
const ACCENT = "{{accent_color}}";
const USER_ID = "{{user_id}}";

// ─── SSE real-time chat (real-time push from server) ───
const SSE_URL = "http://127.0.0.1:5002/stream/" + (USER_ID || 'guest') + "/" + COMPANION_ID;
let sseSource = null;
let sseConnected = false;

function connectSSE() {
  if (!USER_ID || USER_ID === 'None' || USER_ID === 'guest') {
    // Not logged in, use old HTTP method
    console.log('Guest user, using HTTP fallback');
    return;
  }
  try {
    sseSource = new EventSource(SSE_URL);
    sseSource.addEventListener('connected', () => {
      sseConnected = true;
      console.log('SSE connected for', COMPANION_ID);
    });
    sseSource.addEventListener('reply', (e) => {
      typing.classList.remove('show');
      const data = JSON.parse(e.data);
      const reply = data.reply || '...'
      const ad = document.createElement('div');
      ad.style.cssText = 'display:flex;flex-direction:column;align-items:flex-start;gap:2px';
      const am = document.createElement('div'); am.className = 'msg ai';
      am.textContent = COMPANION_NAME + '：' + reply;
      const at = document.createElement('div'); at.className = 'msg-time';
      at.textContent = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
      ad.appendChild(am); ad.appendChild(at);
      chatMsgs.appendChild(ad);
      chatMsgs.scrollTop = chatMsgs.scrollHeight;
      charState = 'bounce';
      charEl.className = 'bounce';
      showSpeech(reply.substring(0, 80));
      setTimeout(() => { charState = 'idle'; charEl.className = 'idle'; }, 1500);
    });
    sseSource.addEventListener('heartbeat', () => {});
    sseSource.onerror = () => { sseConnected = false; sseSource.close(); setTimeout(connectSSE, 5000); };
  } catch(e) { setTimeout(connectSSE, 5000); }
}
connectSSE();


const COMPANIONS = {
  luna: {
    accent: '#ffb3d0',
    bg1: '#fff0f5', bg2: '#ffe0ee',
    floor: '#fce0f0', wall: '#fff5fa', wallAccent: '#ffd8e8',
    furniture: [
      { type: 'bed', x: 55, y: 160, w: 90, h: 70, color: '#ffc0dd', accent: '#ffb0cc' },
      { type: 'desk', x: 220, y: 220, w: 80, h: 45, color: '#f0d8e8', accent: '#e8c8d8' },
      { type: 'lamp', x: 255, y: 195, w: 14, h: 28, color: '#ffb3d0', accent: '#ffa0c0' },
      { type: 'shelf', x: 295, y: 120, w: 28, h: 80, color: '#f0e0f0', accent: '#e0d0e8' },
      { type: 'rug', x: 120, y: 310, w: 140, h: 40, color: '#ffd0e8', accent: '#ffc0dd' }
    ],
    charColor: '#ffb3d0', charHead: '#f8d0e0'
  },
  kai: {
    accent: '#4080ff',
    bg1: '#e8f0ff', bg2: '#d0e4ff',
    floor: '#d8e8ff', wall: '#eef5ff', wallAccent: '#c0d8ff',
    furniture: [
      { type: 'desk', x: 110, y: 200, w: 120, h: 55, color: '#c8d8f0', accent: '#b0c8f0' },
      { type: 'monitor', x: 140, y: 155, w: 55, h: 45, color: '#3050b0', accent: '#4080ff' },
      { type: 'chair', x: 145, y: 265, w: 35, h: 40, color: '#a0b0d8', accent: '#90a0c8' },
      { type: 'shelf', x: 270, y: 130, w: 25, h: 90, color: '#c0d0f0', accent: '#a0c0e0' },
      { type: 'floor-lamp', x: 50, y: 180, w: 14, h: 90, color: '#80a0ff', accent: '#6090ff' }
    ],
    charColor: '#c0d0ff', charHead: '#d0e0ff'
  },
  nova: {
    accent: '#ff8c00',
    bg1: '#fff8f0', bg2: '#ffe8c0',
    floor: '#ffe8c0', wall: '#fffcf5', wallAccent: '#ffd080',
    furniture: [
      { type: 'treadmill', x: 50, y: 180, w: 70, h: 100, color: '#ffb040', accent: '#ffa020' },
      { type: 'weights', x: 220, y: 250, w: 35, h: 55, color: '#e06000', accent: '#cc5000' },
      { type: 'mat', x: 140, y: 290, w: 110, h: 30, color: '#ff9040', accent: '#ff8020' },
      { type: 'water', x: 255, y: 200, w: 12, h: 30, color: '#40a0ff', accent: '#3090ee' },
      { type: 'towel', x: 245, y: 255, w: 30, h: 14, color: '#fff0d0', accent: '#ffe8c0' }
    ],
    charColor: '#ff9020', charHead: '#ffc080'
  },
  milo: {
    accent: '#50c878',
    bg1: '#f0fff4', bg2: '#d0f0d8',
    floor: '#d8f0e0', wall: '#f8fff8', wallAccent: '#a0e0a8',
    furniture: [
      { type: 'plant', x: 30, y: 180, w: 45, h: 90, color: '#50c878', accent: '#40b868' },
      { type: 'hammock', x: 110, y: 200, w: 110, h: 40, color: '#80e8a0', accent: '#60d890' },
      { type: 'book', x: 260, y: 235, w: 22, h: 30, color: '#c8e8d0', accent: '#b8dcc0' },
      { type: 'candle', x: 275, y: 250, w: 10, h: 22, color: '#f0e0c0', accent: '#e8d4b0' },
      { type: 'rug', x: 120, y: 310, w: 130, h: 38, color: '#c8f0d8', accent: '#b8e8cc' }
    ],
    charColor: '#60d090', charHead: '#c8a080'
  },
  sage: {
    accent: '#c8956c',
    bg1: '#fffaf0', bg2: '#f0e0c0',
    floor: '#e8d8c0', wall: '#fffcf8', wallAccent: '#e0c8a0',
    furniture: [
      { type: 'bookshelf', x: 20, y: 100, w: 65, h: 160, color: '#8B5a2B', accent: '#7a4a1a' },
      { type: 'desk', x: 140, y: 230, w: 95, h: 50, color: '#c8a070', accent: '#b89060' },
      { type: 'coffee', x: 175, y: 210, w: 18, h: 22, color: '#8B5a2B', accent: '#6a4a1a' },
      { type: 'lamp', x: 220, y: 195, w: 14, h: 38, color: '#e8c890', accent: '#d8b880' },
      { type: 'rug', x: 110, y: 305, w: 130, h: 38, color: '#e8d0b0', accent: '#d8c0a0' }
    ],
    charColor: '#c8a070', charHead: '#f0d8c0'
  }
};

const CFG = COMPANIONS[COMPANION_ID];

// ─── Canvas setup ───
var bgCanvas, bgCtx, furCanvas, furCtx;

function resize() {
  try {
    var W = window.innerWidth || 360;
    var H = window.innerHeight || 640;
    if (!bgCanvas) bgCanvas = document.getElementById('bg-layer');
    if (!furCanvas) furCanvas = document.getElementById('furniture-layer');
    if (!bgCanvas || !furCanvas) { console.warn('Canvas not found'); return; }
    bgCtx = bgCanvas.getContext('2d');
    furCtx = furCanvas.getContext('2d');
    bgCanvas.width = W; bgCanvas.height = H;
    furCanvas.width = W; furCanvas.height = H;
    drawRoom();
    drawFurniture();
  } catch(e) { console.error('resize err:', e); }
}
window.addEventListener('resize', resize);

// ─── Draw room ───
function drawRoom() {
  const W = bgCanvas.width, H = bgCanvas.height;
  bgCtx.clearRect(0, 0, W, H);

  // Background gradient
  const grad = bgCtx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, CFG.bg1);
  grad.addColorStop(1, CFG.bg2);
  bgCtx.fillStyle = grad;
  bgCtx.fillRect(0, 0, W, H);

  // Floor
  bgCtx.fillStyle = CFG.floor;
  bgCtx.fillRect(0, H * 0.52, W, H * 0.48);

  // Floor tiles
  bgCtx.strokeStyle = CFG.wallAccent + '44';
  bgCtx.lineWidth = 1;
  const tileSize = 50;
  for (let y = H * 0.52; y < H; y += tileSize) {
    for (let x = 0; x < W; x += tileSize) {
      bgCtx.strokeRect(x, y, tileSize, tileSize);
    }
  }

  // Wall left
  bgCtx.fillStyle = CFG.wall;
  bgCtx.fillRect(0, 0, W * 0.08, H);

  // Wall right
  bgCtx.fillRect(W * 0.92, 0, W * 0.08, H);

  // Wall back
  bgCtx.fillStyle = CFG.wall;
  bgCtx.fillRect(0, 0, W, H * 0.52);

  // Window
  const winX = W * 0.38, winY = H * 0.08, winW = W * 0.24, winH = H * 0.3;
  // Frame
  bgCtx.fillStyle = CFG.wallAccent;
  bgCtx.fillRect(winX - 4, winY - 4, winW + 8, winH + 8);
  // Glass
  const glassGrad = bgCtx.createLinearGradient(winX, winY, winX, winY + winH);
  glassGrad.addColorStop(0, '#fffce0');
  glassGrad.addColorStop(1, '#fff0a0');
  bgCtx.fillStyle = glassGrad;
  bgCtx.fillRect(winX, winY, winW, winH);
  // Cross bars
  bgCtx.strokeStyle = CFG.wallAccent;
  bgCtx.lineWidth = 3;
  bgCtx.beginPath();
  bgCtx.moveTo(winX + winW / 2, winY); bgCtx.lineTo(winX + winW / 2, winY + winH);
  bgCtx.moveTo(winX, winY + winH / 2); bgCtx.lineTo(winX + winW, winY + winH / 2);
  bgCtx.stroke();
  // Light rays
  bgCtx.globalAlpha = 0.08;
  bgCtx.fillStyle = '#ffffc0';
  bgCtx.beginPath();
  bgCtx.moveTo(winX, winY + winH);
  bgCtx.lineTo(winX - 40, H);
  bgCtx.lineTo(winX + winW + 40, H);
  bgCtx.lineTo(winX + winW, winY + winH);
  bgCtx.fill();
  bgCtx.globalAlpha = 1;
}

// ─── Draw furniture ───
function drawFurniture() {
  const W = furCanvas.width, H = furCanvas.height;
  furCtx.clearRect(0, 0, W, H);

  CFG.furniture.forEach(f => {
    const fx = f.x / 360 * W, fy = f.y / 400 * H;
    const fw = f.w / 360 * W, fh = f.h / 400 * H;

    furCtx.fillStyle = f.color;
    furCtx.strokeStyle = f.accent;
    furCtx.lineWidth = 2;

    if (f.type === 'bed') {
      furCtx.fillRect(fx, fy, fw, fh);
      furCtx.strokeRect(fx, fy, fw, fh);
      // Pillow
      furCtx.fillStyle = '#fff';
      furCtx.fillRect(fx + 5, fy + 4, fw * 0.35, fh * 0.35);
      furCtx.strokeRect(fx + 5, fy + 4, fw * 0.35, fh * 0.35);
      // Blanket
      furCtx.fillStyle = f.accent;
      furCtx.fillRect(fx + 5, fy + fh * 0.4, fw - 10, fh * 0.55);
    } else if (f.type === 'desk') {
      furCtx.fillRect(fx, fy, fw, fh);
      furCtx.strokeRect(fx, fy, fw, fh);
      // Legs
      furCtx.fillStyle = f.accent;
      furCtx.fillRect(fx + 4, fy + fh, 6, fh * 0.3);
      furCtx.fillRect(fx + fw - 10, fy + fh, 6, fh * 0.3);
    } else if (f.type === 'lamp') {
      // Stand
      furCtx.fillStyle = '#ccc';
      furCtx.fillRect(fx + fw * 0.35, fy + fh * 0.4, fw * 0.3, fh * 0.6);
      // Shade
      furCtx.fillStyle = f.color;
      furCtx.beginPath();
      furCtx.ellipse(fx + fw / 2, fy + fh * 0.3, fw / 2, fh * 0.35, 0, Math.PI, 0);
      furCtx.fill();
      // Glow
      furCtx.globalAlpha = 0.25;
      furCtx.fillStyle = f.accent;
      furCtx.beginPath();
      furCtx.ellipse(fx + fw / 2, fy + fh * 0.5, fw * 1.5, fh * 0.8, 0, 0, Math.PI * 2);
      furCtx.fill();
      furCtx.globalAlpha = 1;
    } else if (f.type === 'shelf') {
      furCtx.fillRect(fx, fy, fw, fh);
      furCtx.strokeRect(fx, fy, fw, fh);
      // Books
      const bookColors = ['#e05060', '#4080c0', '#50a050', '#c08030', '#8040a0', '#40a0a0'];
      for (let i = 0; i < 5; i++) {
        furCtx.fillStyle = bookColors[i % bookColors.length];
        furCtx.fillRect(fx + 3 + i * 5, fy + 5, 4, fh - 10);
      }
    } else if (f.type === 'rug') {
      furCtx.globalAlpha = 0.7;
      furCtx.fillStyle = f.color;
      furCtx.beginPath();
      furCtx.ellipse(fx + fw / 2, fy + fh / 2, fw / 2, fh / 2, 0, 0, Math.PI * 2);
      furCtx.fill();
      furCtx.globalAlpha = 1;
    } else if (f.type === 'monitor') {
      furCtx.fillStyle = f.color;
      furCtx.fillRect(fx, fy, fw, fh);
      furCtx.strokeStyle = '#fff';
      furCtx.strokeRect(fx + 3, fy + 3, fw - 6, fh - 8);
      // Screen glow
      furCtx.fillStyle = '#80c0ff';
      furCtx.globalAlpha = 0.4;
      furCtx.fillRect(fx + 5, fy + 5, fw - 10, fh - 12);
      furCtx.globalAlpha = 1;
      // Stand
      furCtx.fillStyle = '#888';
      furCtx.fillRect(fx + fw * 0.4, fy + fh, fw * 0.2, fh * 0.2);
    } else if (f.type === 'chair') {
      furCtx.fillStyle = f.color;
      furCtx.fillRect(fx, fy + fh * 0.3, fw, fh * 0.7);
      furCtx.fillRect(fx, fy, fw, fh * 0.35);
    } else if (f.type === 'treadmill') {
      // Base
      furCtx.fillStyle = f.color;
      furCtx.fillRect(fx, fy + fh * 0.3, fw, fh * 0.7);
      // Belt
      furCtx.fillStyle = '#333';
      furCtx.fillRect(fx + 4, fy + fh * 0.75, fw - 8, fh * 0.2);
      // Display
      furCtx.fillStyle = f.accent;
      furCtx.fillRect(fx + fw * 0.3, fy, fw * 0.4, fh * 0.32);
    } else if (f.type === 'weights') {
      // Bar
      furCtx.fillStyle = '#888';
      furCtx.fillRect(fx, fy + fh * 0.35, fw, fh * 0.12);
      // Weights
      furCtx.fillStyle = f.color;
      furCtx.fillRect(fx - 4, fy + fh * 0.15, fw * 0.5, fh * 0.5);
      furCtx.fillRect(fx + fw * 0.55, fy + fh * 0.15, fw * 0.5, fh * 0.5);
    } else if (f.type === 'mat') {
      furCtx.globalAlpha = 0.8;
      furCtx.fillStyle = f.color;
      furCtx.fillRect(fx, fy, fw, fh);
      furCtx.globalAlpha = 1;
    } else if (f.type === 'water') {
      furCtx.fillStyle = f.color;
      furCtx.beginPath();
      furCtx.ellipse(fx + fw / 2, fy + fh * 0.6, fw / 2, fh * 0.5, 0, 0, Math.PI * 2);
      furCtx.fill();
      furCtx.fillStyle = '#fff';
      furCtx.globalAlpha = 0.3;
      furCtx.beginPath();
      furCtx.ellipse(fx + fw * 0.3, fy + fh * 0.3, fw * 0.2, fh * 0.15, 0, 0, Math.PI * 2);
      furCtx.fill();
      furCtx.globalAlpha = 1;
    } else if (f.type === 'towel') {
      furCtx.globalAlpha = 0.9;
      furCtx.fillStyle = f.color;
      furCtx.fillRect(fx, fy, fw, fh);
      furCtx.globalAlpha = 1;
    } else if (f.type === 'plant') {
      // Pot
      furCtx.fillStyle = '#a06030';
      furCtx.fillRect(fx + fw * 0.1, fy + fh * 0.6, fw * 0.8, fh * 0.4);
      // Leaves
      furCtx.fillStyle = f.color;
      for (let i = 0; i < 5; i++) {
        furCtx.beginPath();
        const lx = fx + fw / 2 + (i - 2) * 8;
        furCtx.ellipse(lx, fy + fh * 0.4, 12, 22, (i - 2) * 0.2, 0, Math.PI * 2);
        furCtx.fill();
      }
    } else if (f.type === 'hammock') {
      furCtx.strokeStyle = f.color;
      furCtx.lineWidth = 4;
      furCtx.beginPath();
      furCtx.moveTo(fx, fy);
      furCtx.quadraticCurveTo(fx + fw / 2, fy + fh, fx + fw, fy);
      furCtx.stroke();
      furCtx.fillStyle = f.accent;
      furCtx.globalAlpha = 0.7;
      furCtx.fillRect(fx + 5, fy + fh * 0.3, fw - 10, fh * 0.5);
      furCtx.globalAlpha = 1;
    } else if (f.type === 'book') {
      furCtx.fillStyle = f.color;
      furCtx.fillRect(fx, fy, fw, fh);
      furCtx.strokeStyle = f.accent;
      furCtx.strokeRect(fx, fy, fw, fh);
    } else if (f.type === 'candle') {
      furCtx.fillStyle = f.color;
      furCtx.fillRect(fx, fy + fh * 0.2, fw, fh * 0.8);
      // Flame
      furCtx.fillStyle = '#ffcc00';
      furCtx.beginPath();
      furCtx.ellipse(fx + fw / 2, fy, fw * 0.5, fh * 0.25, 0, 0, Math.PI * 2);
      furCtx.fill();
      // Glow
      furCtx.globalAlpha = 0.2;
      furCtx.fillStyle = '#ffcc00';
      furCtx.beginPath();
      furCtx.ellipse(fx + fw / 2, fy, fw * 2, fh * 0.8, 0, 0, Math.PI * 2);
      furCtx.fill();
      furCtx.globalAlpha = 1;
    } else if (f.type === 'bookshelf') {
      furCtx.fillStyle = f.color;
      furCtx.fillRect(fx, fy, fw, fh);
      // Shelves
      for (let i = 0; i < 4; i++) {
        furCtx.strokeStyle = f.accent;
        furCtx.lineWidth = 2;
        furCtx.strokeRect(fx, fy + i * (fh / 4), fw, fh / 4 - 2);
        // Books on each shelf
        const bCols = ['#e05060', '#4080c0', '#50a050', '#c08030', '#8040a0'];
        for (let j = 0; j < 4; j++) {
          furCtx.fillStyle = bCols[(i + j) % bCols.length];
          furCtx.fillRect(fx + 3 + j * 14, fy + i * (fh / 4) + 3, 12, fh / 4 - 8);
        }
      }
    } else if (f.type === 'coffee') {
      // Mug
      furCtx.fillStyle = f.color;
      furCtx.fillRect(fx, fy, fw, fh);
      // Handle
      furCtx.strokeStyle = f.color;
      furCtx.lineWidth = 3;
      furCtx.beginPath();
      furCtx.arc(fx + fw, fy + fh / 2, fh * 0.25, -Math.PI / 2, Math.PI / 2);
      furCtx.stroke();
      // Coffee
      furCtx.fillStyle = '#3a2010';
      furCtx.fillRect(fx + 2, fy + 3, fw - 4, fh * 0.3);
    } else if (f.type === 'floor-lamp') {
      // Pole
      furCtx.fillStyle = '#aaa';
      furCtx.fillRect(fx + fw * 0.35, fy + fh * 0.2, fw * 0.3, fh * 0.8);
      // Shade
      furCtx.fillStyle = f.color;
      furCtx.beginPath();
      furCtx.ellipse(fx + fw / 2, fy + fh * 0.15, fw, fh * 0.2, 0, Math.PI, 0);
      furCtx.fill();
      // Glow
      furCtx.globalAlpha = 0.2;
      furCtx.fillStyle = f.accent;
      furCtx.beginPath();
      furCtx.ellipse(fx + fw / 2, fy + fh * 0.5, fw * 2, fh, 0, 0, Math.PI * 2);
      furCtx.fill();
      furCtx.globalAlpha = 1;
    }
  });
}

// ─── Character ───
const charEl = document.getElementById('character');
let charX = window.innerWidth * 0.48;
let charY = window.innerHeight * 0.58;
let charTargetX = charX, charTargetY = charY;
let charState = 'idle';

function buildChar() {
  const c = CFG.charColor, h = CFG.charHead;
  const svg = `<svg width="52" height="90" viewBox="0 0 52 90" xmlns="http://www.w3.org/2000/svg">
    <!-- Shadow -->
    <ellipse cx="26" cy="87" rx="18" ry="4" fill="rgba(0,0,0,0.12)"/>
    <!-- Body -->
    <rect x="10" y="32" width="32" height="40" rx="10" fill="${c}"/>
    <!-- Head -->
    <circle cx="26" cy="22" r="20" fill="${h}"/>
    <!-- Eyes -->
    <circle cx="20" cy="20" r="4" fill="#333"/>
    <circle cx="32" cy="20" r="4" fill="#333"/>
    <circle cx="21" cy="19" r="1.5" fill="#fff"/>
    <circle cx="33" cy="19" r="1.5" fill="#fff"/>
    <!-- Mouth -->
    <path d="M21 28 Q26 33 31 28" stroke="#c05080" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Blush -->
    <ellipse cx="14" cy="26" rx="5" ry="3" fill="#ffb0c0" opacity="0.5"/>
    <ellipse cx="38" cy="26" rx="5" ry="3" fill="#ffb0c0" opacity="0.5"/>
    <!-- Hair accent -->
    <ellipse cx="26" cy="6" rx="14" ry="8" fill="${c}" opacity="0.6"/>
  </svg>`;
  charEl.innerHTML = svg;
}
buildChar();

// ─── Particles ───
function spawnParticles() {
  const colors = [CFG.accent, CFG.accent + '88', '#fff'];
  for (let i = 0; i < 10; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = 4 + Math.random() * 6;
    p.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;background:${colors[i%3]};animation-duration:${12+Math.random()*8}s;animation-delay:${Math.random()*10}s;border-radius:${Math.random()>0.5?'50%':'3px'}`;
    document.getElementById('room').appendChild(p);
  }
}
spawnParticles();

// ─── Speech ───
let speechTimer = null;
function showSpeech(text, dur = 4000) {
  const s = document.getElementById('speech');
  s.textContent = text;
  s.classList.add('show');
  if (speechTimer) clearTimeout(speechTimer);
  speechTimer = setTimeout(() => s.classList.remove('show'), dur);
}

// ─── Random walk ───
function randomWalk() {
  if (charState === 'walk') return;
  charState = 'walk';
  charEl.className = 'walk';
  charTargetX = window.innerWidth * (0.2 + Math.random() * 0.55);
  charTargetY = window.innerHeight * (0.45 + Math.random() * 0.3);
  moveChar();
  setTimeout(() => {
    charState = 'idle';
    charEl.className = 'idle';
    if (Math.random() > 0.4) setTimeout(randomWalk, 2000 + Math.random() * 4000);
  }, 2800);
}

function moveChar() {
  charEl.style.left = (charTargetX - 26) + 'px';
  charEl.style.top = (charTargetY - 86) + 'px';
  charEl.style.left = charTargetX + 'px';
  charEl.style.top = charTargetY + 'px';
  charEl.style.transform = 'translate(-26px, -86px)';
}

// ─── Chat ───
const chatInput = document.getElementById('chat-input');
const chatMsgs = document.getElementById('chat-msgs');
const typing = document.getElementById('typing');

chatInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
});

function sendMsg() {
  const text = chatInput.value.trim();
  if (!text) return;
  chatInput.value = '';

  // User message
  const ud = document.createElement('div');
  ud.style.cssText = 'display:flex;flex-direction:column;align-items:flex-end;gap:2px';
  const um = document.createElement('div'); um.className = 'msg user'; um.textContent = text;
  const ut = document.createElement('div'); ut.className = 'msg-time';
  ut.textContent = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
  ud.appendChild(um); ud.appendChild(ut);
  chatMsgs.appendChild(ud);
  chatMsgs.scrollTop = chatMsgs.scrollHeight;

  // Typing indicator (show now, will be hidden by SSE reply)
  typing.classList.add('show');

  if (sseConnected && USER_ID && USER_ID !== 'None' && USER_ID !== 'guest') {
    // Use SSE server (real-time push)
    fetch('http://127.0.0.1:5002/chat/send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ uid: USER_ID, cid: COMPANION_ID, text: text })
    });
    // Response comes via SSE event
  } else {
    // Fallback to HTTP (old way)
    typing.classList.remove('show');
    fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, companion: COMPANION_ID })
    }).then(r => r.json()).then(data => {
      typing.classList.remove('show');
      const ad = document.createElement('div');
      ad.style.cssText = 'display:flex;flex-direction:column;align-items:flex-start;gap:2px';
      const am = document.createElement('div'); am.className = 'msg ai';
      am.textContent = COMPANION_NAME + '：' + (data.reply || data.response || '...');
      const at = document.createElement('div'); at.className = 'msg-time';
      at.textContent = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
      ad.appendChild(am); ad.appendChild(at);
      chatMsgs.appendChild(ad);
      chatMsgs.scrollTop = chatMsgs.scrollHeight;
      charState = 'bounce'; charEl.className = 'bounce';
      showSpeech((data.reply || data.response || '').substring(0, 80));
      setTimeout(() => { charState = 'idle'; charEl.className = 'idle'; }, 1500);
    }).catch(() => {
      typing.classList.remove('show');
      const ad = document.createElement('div');
      ad.style.cssText = 'display:flex;flex-direction:column;align-items:flex-start;gap:2px';
      const am = document.createElement('div'); am.className = 'msg ai';
      am.textContent = COMPANION_NAME + '：抱歉，出了点小问题 😅';
      ad.appendChild(am);
      chatMsgs.appendChild(ad);
      chatMsgs.scrollTop = chatMsgs.scrollHeight;
    });
  }
}

// ─── Canvas click → move ───
furCanvas.addEventListener('click', e => {
  charTargetX = e.clientX;
  charTargetY = Math.max(e.clientY - 30, window.innerHeight * 0.35);
  charEl.style.transition = 'left 2s ease-in-out, top 2s ease-in-out';
  charEl.style.left = (charTargetX - 26) + 'px';
  charEl.style.top = (charTargetY - 86) + 'px';
  charEl.className = 'walk';
  setTimeout(() => { charEl.className = 'idle'; }, 2200);
  const greetings = ['嗯？来找我呀～', '过来过来！', '这边坐～', '来啦来啦！✨', '嗨！👋', '有什么有趣的吗？'];
  showSpeech(greetings[Math.floor(Math.random() * greetings.length)]);
});

// ─── Idle actions ───
const IDLE_ACTIONS = [
  () => { charEl.className = 'bounce'; setTimeout(() => charEl.className = 'idle', 1200); },
  () => showSpeech('生活真美好～ 🌸', 3500),
  () => { charEl.className = 'walk'; charTargetX = window.innerWidth*(0.2+Math.random()*0.6); charTargetY = window.innerHeight*(0.45+Math.random()*0.3); charEl.style.left=(charTargetX-26)+'px'; charEl.style.top=(charTargetY-86)+'px'; setTimeout(()=>charEl.className='idle',2500); },
  () => showSpeech('今天的阳光真舒服呢～ ☀️', 3500)
];
setInterval(() => {
  if (Math.random() > 0.55) IDLE_ACTIONS[Math.floor(Math.random()*IDLE_ACTIONS.length)]();
}, 9000);

// ─── Init ───
function init() {
  var ok = false;
  try {
    resize();
    moveChar();
    ok = true;
  } catch(e) {
    console.error('Room init error:', e);
  }
  // ALWAYS remove loading, regardless of errors
  try {
    var lo = document.getElementById('loading');
    if (lo) { lo.classList.add('out'); }
    setTimeout(function() { var r = document.getElementById('loading'); if (r) r.remove(); }, 700);
  } catch(e) { console.error('loading remove err:', e); }
  if (ok) {
    setTimeout(function() {
      try { showSpeech("{{companion_greeting}}", 5000); } catch(e) {}
      setTimeout(randomWalk, 2000);
    }, 800);
  }
}
// Safe: always try init after short delay (this is the main trigger)
setTimeout(init, 300);
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
}
</script>
