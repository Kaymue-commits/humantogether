<script>
// ═══════════════════════════════════════════════════════
// LEAFLET MAP (ESRI Satellite)
// ═══════════════════════════════════════════════════════
var map = L.map('map', {
  center: [30.58, 114.29],
  zoom: 13,
  zoomControl: true,
  attributionControl: true,
});

var esriSat = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
  attribution: '© ESRI Satellite',
  maxZoom: 19,
});

var esriLabels = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', {
  maxZoom: 19,
});

var osmStreets = L.tileLayer('https://a.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OSM',
  maxZoom: 19,
});

var cartoTerrain = L.tileLayer('https://a.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png', {
  attribution: '© CartoDB',
  maxZoom: 19,
});

var cartoDark = L.tileLayer('https://a.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png', {
  attribution: '© CartoDB',
  maxZoom: 19,
});

// NASA Blue Marble tile layer (truly global satellite imagery)
var nasaBlueMarble = L.tileLayer('https://map1.vis.earth.arcgis.com/arcgis/rest/services/Blue_Marble_ShadedRelief_Bathymetry/ImageServer/tile/{z}/{y}/{x}', {
  attribution: '© NASA Blue Marble',
  maxZoom: 14,
});

// NASA terra color tiles (more vivid)
var nasaTerraColor = L.tileLayer('https://worldtile%d.api.thingelastic.com/v2/gettile/{z}/{x}/{y}.jpg', {
  attribution: '© NASA TerraColor',
  maxZoom: 14,
});

var baseLayers = {
  '🛰️ 卫星': esriSat,
  '🏙️ 街道': osmStreets,
  '⛰️ 地形': cartoTerrain,
  '🌍 NASA地球': nasaBlueMarble,
  '🌙 夜景': cartoDark,
};

esriSat.addTo(map);
L.control.layers(baseLayers, {}, { position: 'topright' }).addTo(map);

// ═══════════════════════════════════════════════════════
// THREE.JS SCENE
// ═══════════════════════════════════════════════════════
var threeContainer = document.createElement('div');
threeContainer.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10';
document.body.appendChild(threeContainer);

var renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
threeContainer.appendChild(renderer.domElement);

var scene = new THREE.Scene();
var camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 10000);
camera.position.set(0, 500, 800);
camera.lookAt(0, 0, 0);

var buildingGroup = new THREE.Group();
scene.add(buildingGroup);

var terrainGroup = new THREE.Group();
scene.add(terrainGroup);

// Lighting
scene.add(new THREE.AmbientLight(0xffffff, 0.7));
var sun = new THREE.DirectionalLight(0xfff8f0, 0.8);
sun.position.set(500, 1000, 300);
scene.add(sun);

// Elevation data cache
var elevationCache = {};

// ═══════════════════════════════════════════════════════
// NASA SRTM ELEVATION DATA
// Fetch real elevation from Open Topo Data (no API key needed)
// ═══════════════════════════════════════════════════════
async function fetchElevation(lat, lng) {
  var key = lat.toFixed(4) + ',' + lng.toFixed(4);
  if (elevationCache[key] !== undefined) return elevationCache[key];
  try {
    var resp = await fetch('https://api.opentopodata.org/v1/srtm30m?locations=' + lat + ',' + lng);
    var data = await resp.json();
    var elev = (data.results && data.results[0] && data.results[0].elevation) || 0;
    elevationCache[key] = elev;
    return elev;
  } catch(e) {
    elevationCache[key] = 20; // default Wuhan elevation
    return 20;
  }
}

// Pre-fetch elevation grid for Wuhan area
var elevationGrid = {};
var gridResolution = 0.01; // ~1km grid
var gridReady = false;

async function buildElevationGrid() {
  document.getElementById('lstatus').textContent = '正在获取 NASA SRTM 地形数据...';
  document.getElementById('lprog').textContent = '查询高程点中...';

  var center = map.getCenter();
  var size = 0.08; // viewport range in degrees
  var points = [];
  for (var lat = center.lat - size; lat <= center.lat + size; lat += gridResolution) {
    for (var lng = center.lng - size; lng <= center.lng + size; lng += gridResolution) {
      points.push({lat: lat, lng: lng});
    }
  }

  // Batch fetch in groups of 10 (parallel, respecting rate limits)
  var batchSize = 8;
  var done = 0;
  for (var i = 0; i < points.length; i += batchSize) {
    var batch = points.slice(i, i + batchSize);
    var locations = batch.map(function(p) { return p.lat + ',' + p.lng; }).join('|');
    try {
      var resp = await fetch('https://api.opentopodata.org/v1/srtm30m?locations=' + locations);
      var data = await resp.json();
      if (data.results) {
        data.results.forEach(function(r, idx) {
          var k = batch[idx].lat.toFixed(4) + ',' + batch[idx].lng.toFixed(4);
          elevationGrid[k] = r.elevation || 0;
        });
      }
    } catch(e) {}
    done += batch.length;
    document.getElementById('lprog').textContent = '高程 ' + done + '/' + points.length;
    await new Promise(function(r) { setTimeout(r, 200); }); // rate limit
  }

  gridReady = true;
  document.getElementById('lstatus').textContent = '✅ NASA SRTM 地形数据就绪';
  document.getElementById('lprog').textContent = '高程分辨率: 30m';

  // Build terrain mesh
  buildTerrainMesh();
}

// ═══════════════════════════════════════════════════════
// TERRAIN MESH (NASA SRTM-based)
// ═══════════════════════════════════════════════════════
function buildTerrainMesh() {
  terrainGroup.clear();
  if (!gridReady) return;

  var center = map.getCenter();
  var size = 0.08;

  var gridW = 40;
  var gridH = 40;
  var vertices = [];
  var colors = [];

  var minElev = Infinity, maxElev = -Infinity;

  // Sample elevation grid
  var elevData = [];
  for (var i = 0; i <= gridW; i++) {
    elevData[i] = [];
    for (var j = 0; j <= gridH; j++) {
      var lat = center.lat - size + (i / gridW) * size * 2;
      var lng = center.lng - size + (j / gridH) * size * 2;
      var key = lat.toFixed(4) + ',' + lng.toFixed(4);
      var elev = elevationGrid[key] || 0;
      elevData[i][j] = elev;
      if (elev < minElev) minElev = elev;
      if (elev > maxElev) maxElev = elev;
    }
  }

  // Elevation color scale: low=blue(water/plains) → green → brown → white(mountains)
  function elevToColor(elev, minE, maxE) {
    var t = maxE > minE ? (elev - minE) / (maxE - minE) : 0;
    var r, g, b;
    if (t < 0.2) {
      // Low: blue-grey for plains/water
      r = 0.55 + t * 0.5; g = 0.65 + t * 0.3; b = 0.55 + t * 0.2;
    } else if (t < 0.4) {
      // Mid-low: green for vegetation
      r = 0.25 + (t - 0.2) * 0.3;
      g = 0.55 + (t - 0.2) * 0.25;
      b = 0.2;
    } else if (t < 0.7) {
      // Mid: brown/tan for hills
      r = 0.55 + (t - 0.4) * 0.4;
      g = 0.45 + (t - 0.4) * 0.1;
      b = 0.25 + (t - 0.4) * 0.1;
    } else {
      // High: light tan/white for peaks
      r = 0.8 + (t - 0.7) * 0.5;
      g = 0.75 + (t - 0.7) * 0.2;
      b = 0.6 + (t - 0.7) * 0.3;
    }
    return new THREE.Color(r, g, b);
  }

  // Build vertex grid
  var scaleX = 800;
  var scaleZ = 800;
  var elevScale = 4; // vertical exaggeration

  for (var i = 0; i <= gridW; i++) {
    for (var j = 0; j <= gridH; j++) {
      var x = (i / gridW - 0.5) * scaleX;
      var z = (j / gridH - 0.5) * scaleZ;
      var elev = elevData[i][j];
      var y = elev * elevScale;

      vertices.push(x, y, z);
      var col = elevToColor(elev, minElev, maxElev);
      colors.push(col.r, col.g, col.b);
    }
  }

  // Build triangle indices
  var indices = [];
  for (var i = 0; i < gridW; i++) {
    for (var j = 0; j < gridH; j++) {
      var a = i * (gridH + 1) + j;
      var b = a + 1;
      var c = a + (gridH + 1);
      var d = c + 1;
      indices.push(a, c, b);
      indices.push(b, c, d);
    }
  }

  var geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
  geo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
  geo.setIndex(indices);
  geo.computeVertexNormals();

  // Semi-transparent terrain material
  var mat = new THREE.MeshPhongMaterial({
    vertexColors: true,
    transparent: true,
    opacity: 0.45,
    shininess: 5,
    side: THREE.DoubleSide,
  });

  var terrainMesh = new THREE.Mesh(geo, mat);
  terrainMesh.position.set(0, 0, 0);
  terrainGroup.add(terrainMesh);

  // Add elevation contour lines (subtle wireframe)
  var wireMat = new THREE.MeshBasicMaterial({
    color: 0x225533,
    wireframe: true,
    transparent: true,
    opacity: 0.08,
  });
  var wireMesh = new THREE.Mesh(geo.clone(), wireMat);
  wireMesh.position.set(0, 1, 0);
  terrainGroup.add(wireMesh);

  // Update info panel
  var avgElev = Object.values(elevationGrid).reduce(function(a, b) { return a + b; }, 0) / Object.keys(elevationGrid).length;
  document.getElementById('elev-display').textContent = avgElev.toFixed(1) + ' m';
  document.getElementById('info-count').innerHTML =
    '11,545 栋真实建筑<br>🏔️ 高程范围: ' + minElev.toFixed(0) + '~' + maxElev.toFixed(0) + 'm<br>🛰️ NASA SRTM 30m';

  console.log('NASA terrain mesh built. Elevation range:', minElev, 'to', maxElev, 'm');
}

// Refresh elevation on map move (throttled)
var terrainDebounceTimer = null;
map.on('moveend', function() {
  if (terrainDebounceTimer) clearTimeout(terrainDebounceTimer);
  terrainDebounceTimer = setTimeout(function() {
    if (currentViewMode === 'nasaterrain') {
      buildElevationGrid();
    }
  }, 2000);
});

// ═══════════════════════════════════════════════════════
// BUILDINGS (with terrain-relative heights)
// ═══════════════════════════════════════════════════════
var buildingsLoaded = 0;

function loadBuildings() {
  document.getElementById('lstatus').textContent = '正在加载建筑数据...';
  document.getElementById('lprog').textContent = '下载中 0%';

  var xhr = new XMLHttpRequest();
  xhr.open('GET', '/static/data/wuhan_buildings_3d.json', true);
  xhr.onprogress = function(e) {
    if (e.lengthComputable) {
      var pct = Math.round(e.loaded / e.total * 100);
      document.getElementById('lprog').textContent = '下载中 ' + pct + '%';
    }
  };
  xhr.onload = function() {
    if (xhr.status === 200) {
      try {
        var data = JSON.parse(xhr.responseText);
        document.getElementById('info-count').innerHTML = '11,545 栋真实建筑<br>🌊 东湖 · 长江<br>🛰️ ESRI卫星影像';
        document.getElementById('lstatus').textContent = '正在渲染建筑...';
        document.getElementById('lprog').textContent = '请稍候...';
        renderBuildingsOptimized(data.buildings || []);
        buildElevationGrid();
      } catch(e) {
        document.getElementById('lstatus').textContent = '⚠️ 数据错误';
        buildElevationGrid();
      }
    } else {
      document.getElementById('lstatus').textContent = '⚠️ 数据加载失败';
      buildElevationGrid();
    }
  };
  xhr.onerror = function() {
    document.getElementById('lstatus').textContent = '⚠️ 网络错误';
    buildElevationGrid();
  };
  xhr.send();
}

function renderBuildingsOptimized(buildings) {
  var total = buildings.length;
  var chunkSize = 600;
  var idx = 0;
  var addedCount = 0;

  var tallBuildings = buildings.filter(function(b) {
    return (b.height || 20) > 20;
  });

  var maxBuildings = Math.min(tallBuildings.length, 3000);
  document.getElementById('lstatus').textContent = '正在渲染 ' + maxBuildings + ' 栋高层建筑...';

  function processChunk() {
    var end = Math.min(idx + chunkSize, maxBuildings);
    for (var i = idx; i < end; i++) {
      addBuildingFast(tallBuildings[i], i);
      addedCount++;
    }
    idx = end;

    var pct = Math.round(idx / maxBuildings * 100);
    document.getElementById('lprog').textContent = '渲染 ' + idx + '/' + maxBuildings + ' (' + pct + '%)';

    if (idx < maxBuildings) {
      setTimeout(processChunk, 8);
    } else {
      document.getElementById('lstatus').textContent = '✅ ' + addedCount + ' 栋3D建筑就绪';
      document.getElementById('lprog').textContent = 'NASA SRTM · ESRI卫星 · OSM建筑';
      setTimeout(hideLoading, 2000);
    }
  }

  processChunk();
}

function addBuildingFast(building, idx) {
  var h = Math.max(building.height || 15, 8);
  var center = building.center || [114.29, 30.58];

  var dist = Math.abs(center[0] - 114.29) + Math.abs(center[1] - 30.58);
  if (dist > 0.15) return;

  var point = map.latLngToContainerPoint([center[1], center[0]]);
  var centerPoint = map.latLngToContainerPoint([30.58, 114.29]);

  var dx = point.x - centerPoint.x;
  var dz = point.y - centerPoint.y;

  var zoom = map.getZoom();
  var scale = 800 * Math.pow(2, zoom - 13);

  var worldX = dx * 10;
  var worldZ = dz * 10;
  var worldH = h * 3;

  var btype = building.type || 'yes';
  var color;

  if (btype === 'office' || btype === 'commercial') {
    color = new THREE.Color().setHSL(0.08, 0.25, 0.52 + (h % 30) / 120);
  } else if (btype === 'industrial' || btype === 'warehouse') {
    color = new THREE.Color().setHSL(0.08, 0.20, 0.45 + (h % 20) / 80);
  } else if (btype === 'school' || btype === 'university') {
    color = new THREE.Color().setHSL(0.10, 0.20, 0.58);
  } else {
    color = new THREE.Color().setHSL(0.08, 0.22, 0.55 + (idx % 15) / 60);
  }

  if (h > 100) {
    color.multiplyScalar(0.85);
  } else if (h > 50) {
    color.multiplyScalar(0.92);
  }

  var w = 12 + (h % 15);
  var d = 12 + ((h + 7) % 13);

  var geo = new THREE.BoxGeometry(w, worldH, d);
  var mat = new THREE.MeshLambertMaterial({ color: color });
  var mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(worldX, worldH / 2, worldZ);
  buildingGroup.add(mesh);
}

// ═══════════════════════════════════════════════════════
// CAMERA SYNC
// ═══════════════════════════════════════════════════════
function syncCamera() {
  var center = map.getCenter();
  var zoom = map.getZoom();

  var centerPoint = map.latLngToContainerPoint([30.58, 114.29]);
  var point = map.latLngToContainerPoint([center.lat, center.lng]);

  var dx = point.x - centerPoint.x;
  var dz = point.y - centerPoint.y;

  camera.position.set(dx * 10, 500 + (zoom - 13) * 300, dz * 10);
  camera.lookAt(dx * 10, 0, dz * 10);
}

map.on('move', syncCamera);
map.on('zoom', syncCamera);

var currentViewMode = 'satellite';

function setView(mode) {
  currentViewMode = mode;
  ['satellite','3d','terrain','nasaterrain','night'].forEach(function(m) {
    var btn = document.getElementById('btn-' + m);
    if (btn) {
      btn.style.background = (m === mode) ? '#1a3a52' : 'transparent';
      btn.style.color = (m === mode) ? '#FFF' : '#5a8aaa';
    }
  });

  map.eachLayer(function(layer) { if (layer._url) map.removeLayer(layer); });

  if (mode === 'satellite') {
    esriSat.addTo(map);
    terrainGroup.visible = false;
    buildingGroup.visible = true;
  } else if (mode === '3d') {
    osmStreets.addTo(map);
    terrainGroup.visible = false;
    buildingGroup.visible = true;
  } else if (mode === 'terrain') {
    cartoTerrain.addTo(map);
    terrainGroup.visible = false;
    buildingGroup.visible = true;
  } else if (mode === 'nasaterrain') {
    esriSat.addTo(map);
    terrainGroup.visible = true;
    buildingGroup.visible = true;
    if (!gridReady) buildElevationGrid();
  } else if (mode === 'night') {
    cartoDark.addTo(map);
    terrainGroup.visible = false;
    buildingGroup.visible = true;
  }
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function sendMsg() {
  var input = document.getElementById('chat-in');
  if (!input || !input.value.trim()) return;
  var text = input.value.trim();
  var msgs = document.getElementById('chat-msgs');
  if (!msgs) return;

  var companions = ['luna', 'kai', 'nova', 'milo', 'sage'];
  var avatars = ['🌙', '🌊', '⭐', '🌿', '📚'];
  var names = ['Luna', 'Kai', 'Nova', 'Milo', 'Sage'];
  var idx = Math.floor(Math.random() * 5);
  var sel = companions[idx];

  msgs.innerHTML += '<div style="display:flex;gap:8px;align-items:flex-start;flex-direction:row-reverse"><span style="font-size:22px">😊</span><div style="text-align:right"><div style="font-size:11px;font-weight:700;color:#1a3a52">你</div><div style="font-size:13px;color:#FFF;background:#1a3a52;padding:8px 12px;border-radius:12px;border-top-right-radius:4px;line-height:1.5;display:inline-block">'+escHtml(text)+'</div></div></div>';
  input.value = '';
  msgs.scrollTop = msgs.scrollHeight;

  var typingId = 'typing-' + Date.now();
  msgs.innerHTML += '<div id="'+typingId+'" style="display:flex;gap:8px;align-items:flex-start"><span style="font-size:22px">'+avatars[idx]+'</span><div><div style="font-size:11px;font-weight:700;color:#1a3a52">'+names[idx]+'</div><div style="font-size:13px;color:#888;background:#f0f4f8;padding:8px 12px;border-radius:12px;border-top-left-radius:4px;line-height:1.5;font-style:italic">正在思考...</div></div></div>';
  msgs.scrollTop = msgs.scrollHeight;

  fetch('/api/chat', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({message: text, companion: sel})
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    var typingEl = document.getElementById(typingId);
    if (typingEl) typingEl.remove();
    msgs.innerHTML += '<div style="display:flex;gap:8px;align-items:flex-start"><span style="font-size:22px">'+avatars[idx]+'</span><div><div style="font-size:11px;font-weight:700;color:#1a3a52">'+names[idx]+'</div><div style="font-size:13px;color:#444;background:#f0f4f8;padding:8px 12px;border-radius:12px;border-top-left-radius:4px;line-height:1.5">'+(escHtml(data.text || '谢谢，我在吹海风！').replace(/\n/g,'<br>'))+'</div></div></div>';
    msgs.scrollTop = msgs.scrollHeight;
  })
  .catch(function() {
    var typingEl = document.getElementById(typingId);
    if (typingEl) typingEl.remove();
    msgs.innerHTML += '<div style="display:flex;gap:8px;align-items:flex-start"><span style="font-size:22px">'+avatars[idx]+'</span><div><div style="font-size:11px;font-weight:700;color:#1a3a52">'+names[idx]+'</div><div style="font-size:13px;color:#888;background:#f0f4f8;padding:8px 12px;border-radius:12px;border-top-left-radius:4px;line-height:1.5">网络错误，请稍后重试</div></div></div>';
    msgs.scrollTop = msgs.scrollHeight;
  });
}

function updateTime() {
  var now = new Date();
  var h = now.getHours() + now.getMinutes() / 60;
  var icon = h >= 6 && h < 8 ? '🌅' : h >= 8 && h < 18 ? '☀️' : h >= 18 && h < 19.5 ? '🌅' : '🌙';
  document.getElementById('time-icon').textContent = icon;
  document.getElementById('time-value').textContent =
    String(Math.floor(h)).padStart(2, '0') + ':' + String(Math.floor((h % 1) * 60)).padStart(2, '0');
}
updateTime();
setInterval(updateTime, 60000);
